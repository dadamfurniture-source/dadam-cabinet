  <head>

      rel="stylesheet"
    />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      :root {
        --white: #fafafa;
        --cream: #f8f7f4;
        --warm: #ebe8e2;
        --gray: #8b8680;
        --charcoal: #2d2a26;
        --black: #1a1918;
        --gold: #b8956c;
      }
      body {
        font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        background: var(--cream);
        color: var(--charcoal);
        line-height: 1.7;
        min-height: 100vh;
      }
      h1, h2, h3 { font-family: 'Playfair Display', 'Noto Serif KR', serif; font-weight: 500; }
      a { text-decoration: none; color: inherit; }

      .main {
        max-width: 960px;
        margin: 0 auto;
        padding: 112px 24px 60px;
      }

      /* Hero Summary */
      .hero-summary {
        text-align: center;
        margin-bottom: 40px;
      }
      .hero-summary .label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--gold);
        margin-bottom: 8px;
      }
      .hero-summary h1 {
        font-size: 2rem;
        margin-bottom: 16px;
      }
      .hero-summary .design-info {
        display: flex;
        justify-content: center;
        gap: 16px;
        flex-wrap: wrap;
      }
      .hero-summary .info-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 16px;
        background: #fff;
        border: 1px solid var(--warm);
        border-radius: 20px;
        font-size: 13px;
        color: var(--charcoal);
      }

      /* Location Bar */
      .location-bar {
        background: #fff;
        border: 1px solid var(--warm);
        border-radius: 12px;
        padding: 16px 24px;
        margin-bottom: 32px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .location-bar .loc-icon { font-size: 20px; }
      .location-bar .loc-text { font-size: 14px; color: var(--charcoal); flex: 1; }
      .location-bar .loc-btn {
        padding: 8px 16px;
        background: var(--charcoal);
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.3s;
      }
      .location-bar .loc-btn:hover { background: var(--gold); }
      .location-fallback {
        display: none;
        gap: 8px;
        width: 100%;
        margin-top: 8px;
      }
      .location-fallback select {
        flex: 1;
        padding: 8px 12px;
        border: 1px solid var(--warm);
        border-radius: 6px;
        font-size: 13px;
        background: #fff;
      }

      /* Section */
      .section-title {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 20px;
      }
      .section-title h2 { font-size: 1.4rem; }
      .section-title .badge {
        font-size: 11px;
        padding: 4px 10px;
        background: var(--gold);
        color: #fff;
        border-radius: 12px;
        font-weight: 600;
      }

      /* Partner Card */
      .partner-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
        margin-bottom: 48px;
      }
      .partner-card {
        background: #fff;
        border: 1px solid var(--warm);
        border-radius: 16px;
        overflow: hidden;
        transition: transform 0.3s, box-shadow 0.3s;
      }
      .partner-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      }
      .card-header {
        padding: 20px 20px 12px;
        display: flex;
        align-items: flex-start;
        gap: 12px;
      }
      .card-logo {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        background: var(--warm);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        font-weight: 700;
        color: var(--gold);
        flex-shrink: 0;
      }
      .card-info { flex: 1; }
      .card-info .name {
        font-size: 16px;
        font-weight: 700;
        color: var(--charcoal);
        margin-bottom: 2px;
      }
      .card-info .specialty {
        font-size: 12px;
        color: var(--gray);
      }
      .card-distance {
        font-size: 12px;
        color: var(--gold);
        font-weight: 600;
        white-space: nowrap;
      }
      .card-tags {
        padding: 0 20px 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .card-tags .tag {
        font-size: 11px;
        padding: 3px 10px;
        background: var(--cream);
        border-radius: 10px;
        color: var(--charcoal);
      }
      .card-portfolio {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 3px;
        padding: 0 3px;
      }
      .card-portfolio img {
        width: 100%;
        aspect-ratio: 1;
        object-fit: cover;
      }
      .card-rating {
        padding: 12px 20px;
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: var(--gray);
      }
      .card-rating .stars { color: #f5a623; }
      .card-contact {
        padding: 0 20px 20px;
        display: flex;
        gap: 8px;
      }
      .card-contact .btn {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        text-align: center;
      }
      .btn-primary {
        background: var(--charcoal);
        color: #fff;
      }
      .btn-primary:hover { background: var(--gold); }
      .btn-secondary {
        background: var(--cream);
        color: var(--charcoal);
        border: 1px solid var(--warm) !important;
      }
      .btn-secondary:hover { background: var(--warm); }

      /* Empty / Loading */
      .loading-state, .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--gray);
      }
      .loading-spinner {
        width: 32px;
        height: 32px;
        border: 3px solid var(--warm);
        border-top-color: var(--gold);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 16px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* Verified Badge */
      .verified { color: #4CAF50; font-size: 14px; }

      /* Back link */
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: var(--gray);
        margin-bottom: 24px;
        transition: color 0.3s;
      }
      .back-link:hover { color: var(--charcoal); }

      /* Responsive */
      @media (max-width: 768px) {
        .partner-grid { grid-template-columns: 1fr; }
        .hero-summary h1 { font-size: 1.6rem; }
        .main { padding: 100px 16px 40px; }
      }
    </style>

            <option value="">시/도 선택</option>

      <div class="section-title">

        <div class="loading-state"><div class="loading-spinner"></div>추천 업체를 찾고 있습니다...</div>

        <span class="badge">TOP 2</span>
      </div>
      <div class="partner-grid" id="factoryGrid">

      </div>

    <script>
      // ═══════════════════════════════════════════════════════════════
      // Utilities
      // ═══════════════════════════════════════════════════════════════
      function escapeHtml(text) {
        if (!text) return '';
        const map = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
        return String(text).replace(/[&<>"']/g, m => map[m]);
      }

      // ═══════════════════════════════════════════════════════════════
      // State & Config
      // ═══════════════════════════════════════════════════════════════

        '울산광역시': { lat: 35.5384, lng: 129.3114, guguns: ['남구','동구','북구','울주군','중구'] },
      };

      // Context from ai-design.html
      let partnerContext = {};
      try {
        partnerContext = JSON.parse(sessionStorage.getItem('partnerContext') || '{}');
      } catch(e) {}

      // ═══════════════════════════════════════════════════════════════
      // Init
      // ═══════════════════════════════════════════════════════════════
      let currentUser = null;

      async function init() {
        // 컨텍스트 없으면 ai-design으로 리다이렉트
        if (!partnerContext.categories?.length) {
          window.location.href = 'ai-design.html';
          return;
        }

        // Supabase init
        if (window.supabase && SUPABASE_KEY) {
          supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
          // 로그인 상태 확인
          try {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session?.user) currentUser = session.user;
          } catch(e) {}
        }

        // Render design info chips
        renderDesignInfo();

        // Populate sido dropdown
        const sidoSelect = document.getElementById('sidoSelect');
        Object.keys(sidoCentroids).forEach(sido => {
          const opt = document.createElement('option');
          opt.value = sido;
          opt.textContent = sido;
          sidoSelect.appendChild(opt);
        });

        // Load partners
        await loadPartners();
        renderRecommendations();
      }

      function renderDesignInfo() {
        const container = document.getElementById('designInfo');
        const chips = [];
        if (partnerContext.categories?.length) {
          partnerContext.categories.forEach(cat => {
            chips.push(`<span class="info-chip">📦 ${categoryLabels[cat] || cat}</span>`);
          });
        }
        if (partnerContext.styleName) {
          chips.push(`<span class="info-chip">🎨 ${partnerContext.styleName}</span>`);
        }
        if (partnerContext.quoteTotal) {
          chips.push(`<span class="info-chip">💰 ${partnerContext.quoteTotal.toLocaleString()}원</span>`);
        }
        container.innerHTML = chips.join('') || '<span class="info-chip">AI Design에서 견적을 먼저 받아주세요</span>';
      }

      // ═══════════════════════════════════════════════════════════════
      // Location
      // ═══════════════════════════════════════════════════════════════
      function requestLocation() {
        if (!navigator.geolocation) {
          showFallback();
          return;
        }
        document.getElementById('locText').textContent = '위치를 확인하는 중...';
        navigator.geolocation.getCurrentPosition(
          pos => {
            userLat = pos.coords.latitude;
            userLng = pos.coords.longitude;
            document.getElementById('locText').textContent = `현재 위치 기반으로 추천합니다 (${userLat.toFixed(2)}, ${userLng.toFixed(2)})`;
            document.getElementById('locBtn').textContent = '위치 재설정';
            renderRecommendations();
          },
          err => {
            showFallback();
          },
          { timeout: 5000, maximumAge: 300000 }
        );
      }

      function showFallback() {
        document.getElementById('locFallback').style.display = 'flex';
        document.getElementById('locText').textContent = '지역을 직접 선택해주세요';
        document.getElementById('locBtn').style.display = 'none';
      }

      function onSidoChange() {
        const sido = document.getElementById('sidoSelect').value;
        const gugunSelect = document.getElementById('gugunSelect');
        gugunSelect.innerHTML = '<option value="">구/군 선택</option>';
        if (sido && sidoCentroids[sido]) {
          sidoCentroids[sido].guguns.forEach(g => {
            const opt = document.createElement('option');
            opt.value = g;
            opt.textContent = g;
            gugunSelect.appendChild(opt);
          });
          userLat = sidoCentroids[sido].lat;
          userLng = sidoCentroids[sido].lng;
          renderRecommendations();
        }
      }

      function onGugunChange() {
        renderRecommendations();
      }

      // ═══════════════════════════════════════════════════════════════
      // Load Partners from Supabase
      // ═══════════════════════════════════════════════════════════════
      async function loadPartners() {
        if (!supabaseClient) {
          allPartners = getDemoPartners();
          return;
        }
        try {
          const { data, error } = await supabaseClient
            .from('partners')
            .select('*')
            .eq('is_active', true);
          if (error || !data?.length) {
            allPartners = getDemoPartners();
          } else {
            allPartners = data;
          }
        } catch(e) {
          allPartners = getDemoPartners();
        }
      }

      // ═══════════════════════════════════════════════════════════════
      // Scoring & Recommendation
      // ═══════════════════════════════════════════════════════════════
      function haversineKm(lat1, lng1, lat2, lng2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLng = (lng2 - lng1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 +
                  Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
                  Math.sin(dLng/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      }

      function scorePartner(partner) {
        let score = 0;
        const cats = partnerContext.categories || [];
        const style = partnerContext.style || '';

        // Distance score (0-40): closer = higher
        if (userLat && partner.lat) {
          const dist = haversineKm(userLat, userLng, partner.lat, partner.lng);
          score += Math.max(0, 40 - dist * 0.5);
        } else {
          score += 20; // no location = neutral
        }

        // Category match (0-35)
        if (cats.length > 0 && partner.specialty_categories) {
          const matches = cats.filter(c => partner.specialty_categories.includes(c)).length;
          score += matches * (35 / cats.length);
        } else {
          score += 17;
        }

        // Style match (0-15)
        if (style && partner.specialty_styles?.includes(style)) {
          score += 15;
        }

        // Verified + rating (0-10)
        if (partner.is_verified) score += 5;
        score += Math.min(5, (partner.rating || 0));

        return score;
      }

      function getTopPartners(type, count) {
        const typed = allPartners.filter(p => p.partner_type === type);
        const scored = typed.map(p => ({
          ...p,
          score: scorePartner(p),
          distance: userLat && p.lat ? haversineKm(userLat, userLng, p.lat, p.lng) : null
        }));
        scored.sort((a, b) => b.score - a.score || (b.review_count || 0) - (a.review_count || 0));
        return scored.slice(0, count);
      }

      // ═══════════════════════════════════════════════════════════════
      // Render
      // ═══════════════════════════════════════════════════════════════
      function renderRecommendations() {
        renderGrid('interiorGrid', getTopPartners('interior', 2));
        renderGrid('factoryGrid', getTopPartners('factory', 2));
        bindCardActions();
      }

      function bindCardActions() {
        document.querySelectorAll('[data-action="save"]').forEach(btn => {
          btn.onclick = () => savePartner(btn.dataset.id);
        });
        document.querySelectorAll('[data-action="consult"]').forEach(btn => {
          btn.onclick = () => requestConsultation(btn.dataset.id, btn.dataset.name);
        });
      }

      function renderGrid(containerId, partners) {
        const container = document.getElementById(containerId);
        if (!partners.length) {
          container.innerHTML = '<div class="empty-state">추천 가능한 업체가 없습니다</div>';
          return;
        }
        container.innerHTML = partners.map(p => renderCard(p)).join('');
      }

      function renderCard(p) {
        const cats = (p.specialty_categories || [])
          .filter(c => categoryLabels[c])
          .map(c => `<span class="tag">${categoryLabels[c]}</span>`)
          .join('');

        const distText = p.distance != null
          ? `📍 ${p.distance < 1 ? (p.distance * 1000).toFixed(0) + 'm' : p.distance.toFixed(1) + 'km'}`
          : `📍 ${escapeHtml(p.sido)} ${escapeHtml(p.gugun)}`;

        const fullStars = Math.floor(p.rating || 0);
        const halfStar = (p.rating || 0) % 1 >= 0.5 ? 1 : 0;
        const emptyStars = 5 - fullStars - halfStar;
        const stars = '★'.repeat(fullStars) + '½'.repeat(halfStar) + '☆'.repeat(Math.max(0, emptyStars));

        const initial = escapeHtml(p.company_name.charAt(0));

        // Portfolio placeholder (3 slots)
        const portfolioHtml = (p.portfolio_images?.length > 0)
          ? p.portfolio_images.slice(0, 3).map(img =>
              `<img src="${img.url}" alt="${img.caption || ''}" loading="lazy" onerror="this.style.background='var(--warm)';this.alt=''">`
            ).join('')
          : `<div style="background:var(--warm);aspect-ratio:1;display:flex;align-items:center;justify-content:center;color:var(--gray);font-size:11px;">준비중</div>`.repeat(3);

        return `
          <div class="partner-card">
            <div class="card-header">
              <div class="card-logo">${initial}</div>
              <div class="card-info">
                <div class="name">
                  ${escapeHtml(p.company_name)}
                  ${p.is_verified ? '<span class="verified" title="인증 업체">✓</span>' : ''}
                </div>
                <div class="specialty">${escapeHtml(p.description || p.specialty_text || '')}</div>
              </div>
              <div class="card-distance">${distText}</div>
            </div>
            <div class="card-tags">${cats}</div>
            <div class="card-portfolio">${portfolioHtml}</div>
            <div class="card-rating">
              <span class="stars">${stars}</span>
              <span>${p.rating || 0}</span>
              <span style="color:var(--gray);">(${p.review_count || 0}건 | 시공 ${p.completed_projects || 0}건)</span>
            </div>
            <div class="card-contact">
              <button class="btn btn-secondary" data-action="save" data-id="${escapeHtml(p.id)}" id="save-${escapeHtml(p.id)}" aria-label="업체 저장" title="저장">♡</button>
              <a href="tel:${escapeHtml(p.phone)}" class="btn btn-secondary" style="display:block;flex:1;">📞 전화</a>
              <button class="btn btn-primary" style="flex:2;" data-action="consult" data-id="${escapeHtml(p.id)}" data-name="${escapeHtml(p.company_name)}">상담 신청</button>
            </div>
          </div>
        `;
      }

      async function savePartner(partnerId) {
        if (!currentUser) {
          alert('로그인 후 저장할 수 있습니다.');
          window.location.href = 'login.html';
          return;
        }
        try {
          const { error } = await supabaseClient.from('saved_partners').upsert({
            user_id: currentUser.id,
            partner_id: partnerId,
            context_json: {
              categories: partnerContext.categories,
              style: partnerContext.style,
              quoteTotal: partnerContext.quoteTotal
            }
          }, { onConflict: 'user_id,partner_id' });

          const btn = document.getElementById('save-' + partnerId);
          if (!error) {
            btn.innerHTML = '♥';
            btn.style.color = '#e74c3c';
            btn.style.background = '#fff0f0';
          } else {
            alert('저장 실패: ' + error.message);
          }
        } catch(e) {
          alert('저장 중 오류가 발생했습니다.');
        }
      }

      function requestConsultation(partnerId, partnerName) {
        sessionStorage.setItem('consultPartner', JSON.stringify({
          partnerId, partnerName,
          categories: partnerContext.categories,
          quoteTotal: partnerContext.quoteTotal
        }));
        window.location.href = 'consultation.html';
      }

      // ═══════════════════════════════════════════════════════════════
      // Init on load
      // ═══════════════════════════════════════════════════════════════
      document.addEventListener('DOMContentLoaded', init);
    </script>
