<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#B8956C" />
    <title>다담AI - AI 가구 설계 어시스턴트</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Noto+Serif+KR:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      :root {
        --white: #fafafa; --cream: #f8f7f4; --warm: #ebe8e2;
        --gray: #8b8680; --charcoal: #2d2a26; --black: #1a1918;
        --gold: #b8956c; --gold-light: #d4b896;
        --bg: #f5f4f1; --card: #ffffff; --border: #e8e5e0;
        --success: #4caf50; --error: #f44336; --info: #2196f3;
      }
      body {
        font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        background: var(--bg); color: var(--charcoal);
        line-height: 1.6; height: 100vh; overflow: hidden;
      }
      h1, h2, h3, h4 { font-family: 'Playfair Display', 'Noto Serif KR', serif; font-weight: 500; }

      /* ─── Header ─── */
      .header {
        background: var(--card); border-bottom: 1px solid var(--border);
        padding: 12px 24px; display: flex; align-items: center; gap: 12px;
      }
      .header h1 { font-size: 18px; color: var(--charcoal); }
      .header .subtitle { font-size: 12px; color: var(--gray); }

      /* ─── Main Layout ─── */
      .main { display: flex; height: calc(100vh - 52px); }

      /* ─── Chat Panel ─── */
      .chat-panel {
        flex: 1; min-width: 0; display: flex; flex-direction: column;
        border-right: 1px solid var(--border);
      }
      #chat-area { flex: 1; display: flex; flex-direction: column; position: relative; }
      #chat-area.drag-over { background: rgba(184, 149, 108, 0.05); }
      #chat-messages {
        flex: 1; overflow-y: auto; padding: 16px;
        display: flex; flex-direction: column; gap: 12px;
      }

      /* Messages */
      .message { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; }
      .user-message {
        align-self: flex-end; background: var(--gold); color: white;
        border-bottom-right-radius: 4px;
      }
      .bot-message {
        align-self: flex-start; background: var(--card); border: 1px solid var(--border);
        border-bottom-left-radius: 4px;
      }
      .msg-text { white-space: pre-wrap; word-break: break-word; }
      .msg-images { display: flex; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
      .msg-thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; }
      .msg-progress {
        font-size: 12px; color: var(--gray); margin-bottom: 6px;
        display: flex; align-items: center; gap: 6px;
      }
      .spinner {
        width: 14px; height: 14px; border: 2px solid var(--border);
        border-top-color: var(--gold); border-radius: 50%;
        animation: spin 0.8s linear infinite; display: inline-block;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .check { color: var(--success); font-weight: bold; }
      .error-mark { color: var(--error); font-weight: bold; }

      /* Input Area */
      .input-area {
        padding: 12px 16px; border-top: 1px solid var(--border);
        background: var(--card); display: flex; gap: 8px; align-items: flex-end;
      }
      #image-preview {
        display: none; gap: 6px; padding: 8px 16px 0;
        background: var(--card); flex-wrap: wrap;
      }
      .preview-item { position: relative; }
      .preview-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; }
      .preview-remove {
        position: absolute; top: -4px; right: -4px; width: 18px; height: 18px;
        border-radius: 50%; background: var(--error); color: white;
        border: none; font-size: 11px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
      }
      #chat-input {
        flex: 1; border: 1px solid var(--border); border-radius: 8px;
        padding: 10px 12px; font-size: 14px; resize: none; outline: none;
        font-family: inherit; min-height: 42px; max-height: 120px;
        transition: border-color 0.2s;
      }
      #chat-input:focus { border-color: var(--gold); }
      #upload-btn, #send-btn {
        width: 42px; height: 42px; border-radius: 8px; border: none;
        cursor: pointer; display: flex; align-items: center; justify-content: center;
        font-size: 18px; transition: all 0.2s;
      }
      #upload-btn { background: var(--warm); color: var(--gray); }
      #upload-btn:hover { background: var(--gold-light); color: var(--charcoal); }
      #send-btn { background: var(--gold); color: white; }
      #send-btn:hover { background: var(--charcoal); }
      #send-btn:disabled { background: var(--border); cursor: not-allowed; }

      /* ─── Visual Panel ─── */
      .visual-panel {
        width: 45%; min-width: 360px; display: flex; flex-direction: column;
        background: var(--card);
      }
      .visual-tabs {
        display: flex; border-bottom: 1px solid var(--border); overflow-x: auto;
      }
      .tab-btn {
        padding: 10px 16px; font-size: 13px; border: none;
        background: none; cursor: pointer; color: var(--gray);
        border-bottom: 2px solid transparent; white-space: nowrap;
        font-family: inherit; transition: all 0.2s;
      }
      .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
      .visual-body { flex: 1; overflow-y: auto; padding: 16px; }
      .visual-content { display: none; }
      .visual-content.active { display: block; }

      /* Gallery */
      #image-gallery { display: flex; flex-wrap: wrap; gap: 12px; }
      .gallery-item { text-align: center; }
      .gallery-image {
        max-width: 100%; border-radius: 8px; cursor: pointer;
        transition: transform 0.2s; border: 1px solid var(--border);
      }
      .gallery-image:hover { transform: scale(1.02); }
      .gallery-label { font-size: 12px; color: var(--gray); margin-top: 4px; display: block; }

      /* Design Info */
      .info-row {
        display: flex; justify-content: space-between; padding: 8px 0;
        border-bottom: 1px solid var(--border); font-size: 13px;
      }
      .info-key { color: var(--gray); }
      .info-val { font-weight: 500; }

      /* BOM */
      .bom-summary { font-size: 13px; color: var(--gray); margin-bottom: 12px; padding: 8px; background: var(--cream); border-radius: 6px; }
      #bom-table table { width: 100%; border-collapse: collapse; font-size: 12px; }
      #bom-table th { background: var(--warm); padding: 6px 8px; text-align: left; font-weight: 500; }
      #bom-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); }

      /* SVG */
      .svg-section { margin-bottom: 24px; }
      .svg-section h4 { font-size: 14px; margin-bottom: 8px; color: var(--charcoal); }
      .svg-container { overflow-x: auto; background: white; border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
      .svg-container svg { max-width: 100%; height: auto; }

      /* Lightbox */
      #lightbox {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.85); z-index: 1000;
        align-items: center; justify-content: center; cursor: pointer;
      }
      #lightbox.active { display: flex; }
      #lightbox img { max-width: 90%; max-height: 90%; border-radius: 8px; }

      /* Placeholder */
      .placeholder { text-align: center; color: var(--gray); padding: 40px 20px; font-size: 14px; }

      /* ─── Mobile ─── */
      @media (max-width: 768px) {
        .main { flex-direction: column; }
        .chat-panel { border-right: none; height: 55vh; }
        .visual-panel { width: 100%; min-width: 0; height: 45vh; border-top: 1px solid var(--border); }
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--gray); }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>다담AI</h1>
      <span class="subtitle">AI 가구 설계 어시스턴트</span>
    </div>

    <div class="main">
      <!-- Chat Panel -->
      <div class="chat-panel">
        <div id="chat-area">
          <div id="chat-messages"></div>
        </div>
        <div id="image-preview"></div>
        <div class="input-area">
          <button id="upload-btn" title="사진 첨부">📎</button>
          <input type="file" id="image-input" accept="image/*" multiple hidden>
          <textarea id="chat-input" placeholder="메시지를 입력하세요..." rows="1"></textarea>
          <button id="send-btn" title="전송">➤</button>
        </div>
      </div>

      <!-- Visual Panel -->
      <div class="visual-panel" id="visual-panel">
        <div class="visual-tabs">
          <button class="tab-btn active" data-tab="images">이미지</button>
          <button class="tab-btn" data-tab="info">설계정보</button>
          <button class="tab-btn" data-tab="bom">BOM</button>
          <button class="tab-btn" data-tab="drawings">도면</button>
        </div>
        <div class="visual-body">
          <div id="tab-images" class="visual-content active">
            <div id="image-gallery"></div>
            <div class="placeholder" id="images-placeholder">
              생성된 이미지가 여기에 표시됩니다
            </div>
          </div>
          <div id="tab-info" class="visual-content">
            <div id="design-info"></div>
            <div class="placeholder" id="info-placeholder">
              설계 데이터가 여기에 표시됩니다
            </div>
          </div>
          <div id="tab-bom" class="visual-content">
            <div id="bom-table"></div>
            <div class="placeholder" id="bom-placeholder">
              BOM(부품 목록)이 여기에 표시됩니다
            </div>
          </div>
          <div id="tab-drawings" class="visual-content">
            <div id="svg-viewer"></div>
            <div class="placeholder" id="drawings-placeholder">
              도면이 여기에 표시됩니다
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox"><img src="" alt="확대 이미지"></div>

    <script src="js/agent-chat.js"></script>
  </body>
</html>
