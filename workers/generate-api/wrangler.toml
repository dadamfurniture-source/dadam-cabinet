name = "dadam-generate-api"
main = "src/worker.js"
compatibility_date = "2024-01-01"
account_id = "8bd8e054dfc7bcdc577f9bb79edd3284"

# Smart Placement — Worker 실행 위치를 백엔드 (Google Generative Language API, US) 근처로
# 이동시켜 egress IP 를 미국 데이터센터로 만든다. Google AI Studio API 가 한국 발신을
# "User location is not supported" 로 차단하던 문제를 우회한다.
[placement]
mode = "smart"

[vars]
# 카테고리별 Gemini 모델 분기
# - GEMINI_MODEL: 기본값 (붙박이장·냉장고장·파우더룸·신발장·수납장). 3.1 로 도어 카운트 준수·SPEC LOCK 정확도 향상.
# - GEMINI_MODEL_SINK: 싱크대 전용. 2.5 에서 AI Two-tone 색 배합과 레이아웃이 안정적이라 유지.
#   3.1 로 올리면 싱크대 회귀 리스크 있음 — 충분히 검증 후에만 통일.
GEMINI_MODEL = "gemini-3.1-flash-image-preview"
GEMINI_MODEL_SINK = "gemini-2.5-flash-image"

# Cloudflare AI Gateway base URL — Google Generative Language API 와 Anthropic API 를
# 한국 발신에서 차단 (400 "User location is not supported" / 403 "Request not allowed")
# 하는 문제 우회. Gateway 가 US 엣지에서 provider 로 프록시.
# 설정되면 워커가 google-ai-studio/... 와 anthropic/v1/messages 를 이 경로 아래로 호출.
AI_GATEWAY_BASE = "https://gateway.ai.cloudflare.com/v1/8bd8e054dfc7bcdc577f9bb79edd3284/dadam-ai"

# GEMINI_API_KEY는 Cloudflare 대시보드에서 Secret으로 설정
# wrangler secret put GEMINI_API_KEY
