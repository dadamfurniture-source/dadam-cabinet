<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Sink HITL 수집 — 다담AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f7; color: #1d1d1f; }
    .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: #fff; border-bottom: 1px solid #d2d2d7; }
    .top-bar h1 { font-size: 16px; }
    .top-bar .actions { display: flex; gap: 8px; align-items: center; }
    .layout { display: grid; grid-template-columns: 300px 1fr 320px; height: calc(100vh - 52px); }
    .panel { background: #fff; padding: 12px; overflow-y: auto; border-right: 1px solid #e8e8ed; }
    .panel:last-child { border-right: none; border-left: 1px solid #e8e8ed; }
    .panel h2 { font-size: 12px; color: #86868b; text-transform: uppercase; letter-spacing: 0.5px; margin: 0 0 8px; }
    label { display: block; font-size: 11px; margin: 4px 0 2px; color: #515154; }
    input, select { width: 100%; padding: 5px 7px; border: 1px solid #d2d2d7; border-radius: 5px; font-size: 12px; }
    button { padding: 7px 12px; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 500; }
    .btn-primary { background: #0071e3; color: #fff; }
    .btn-primary:hover { background: #0077ed; }
    .btn-success { background: #34c759; color: #fff; }
    .btn-success:hover { background: #30b653; }
    .btn-danger { background: #ff3b30; color: #fff; font-size: 10px; padding: 3px 6px; }
    .btn-sm { font-size: 11px; padding: 4px 8px; background: #e8e8ed; color: #1d1d1f; }
    .btn-sm:hover { background: #d2d2d7; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; font-size: 11px; margin-top: 8px; }
    .stat-box { background: #f5f5f7; padding: 6px; border-radius: 5px; text-align: center; }
    .stat-label { color: #86868b; font-size: 9px; }
    .stat-val { font-size: 16px; font-weight: 600; margin-top: 1px; }
    #status { font-size: 11px; color: #86868b; margin-top: 6px; min-height: 14px; }
    .planner-frame { width: 100%; height: 100%; border: none; background: #1a1a2e; }
    .section-title { font-size: 11px; font-weight: 600; color: #1d1d1f; margin: 10px 0 4px; padding: 4px 0; border-bottom: 1px solid #e8e8ed; display: flex; justify-content: space-between; align-items: center; }
    .mod-card { background: #f5f5f7; border-radius: 6px; padding: 8px; margin-bottom: 6px; position: relative; }
    .mod-card.highlight { background: #e3f2fd; border: 1px solid #0071e3; }
    .mod-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .mod-type { font-size: 11px; font-weight: 600; color: #0071e3; text-transform: uppercase; }
    .mod-row { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    .mod-row label { font-size: 10px; margin: 2px 0 1px; }
    .mod-row input, .mod-row select { font-size: 11px; padding: 3px 5px; }
    .rating-row { display: flex; gap: 6px; align-items: center; margin: 8px 0; }
    .rating-row label { margin: 0; font-size: 11px; white-space: nowrap; }
    .rating-row input { width: 50px; text-align: center; }
    .badge { display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 600; }
    .badge-sink { background: #dbeafe; color: #1e40af; }
    .badge-cook { background: #fef3c7; color: #92400e; }
    .badge-hood { background: #fce7f3; color: #9d174d; }
    .badge-lt { background: #d1fae5; color: #065f46; }
    .badge-storage { background: #f3f4f6; color: #374151; }
    .badge-drawer { background: #ede9fe; color: #5b21b6; }
    .badge-blank { background: #e5e7eb; color: #6b7280; }
    .divider { height: 1px; background: #e8e8ed; margin: 12px 0; }
    .layout-selector { display: flex; gap: 4px; margin: 4px 0 8px; }
    .layout-btn { flex: 1; padding: 8px 4px; border: 2px solid #d2d2d7; border-radius: 6px; background: #fff; cursor: pointer; text-align: center; font-size: 11px; font-weight: 600; }
    .layout-btn.active { border-color: #0071e3; background: #e3f2fd; color: #0071e3; }
    .layout-btn .shape { font-size: 18px; display: block; margin-bottom: 2px; }
    .secondary-fields { display: none; background: #f0f7ff; border-radius: 6px; padding: 8px; margin: 6px 0; }
    .secondary-fields.show { display: block; }
    .badge-secondary { background: #fef9c3; color: #854d0e; font-size: 8px; margin-left: 4px; }
    .orientation-tag { font-size: 9px; color: #92400e; background: #fef3c7; padding: 1px 4px; border-radius: 3px; margin-left: 4px; }
  </style>
</head>
<body>
  <div class="top-bar">
    <h1>Sink HITL 수집</h1>
    <div class="actions">
      <div class="rating-row">
        <label>평점</label>
        <input type="number" id="rating" value="3" min="1" max="5" />
        <input type="text" id="comment" placeholder="주석(선택)" style="width:120px" />
      </div>
      <button class="btn-success" id="btn-save">✅ 저장</button>
      <button class="btn-primary" id="btn-generate">🎲 생성</button>
      <button class="btn-primary" id="btn-next">⏭ 다음</button>
    </div>
  </div>

  <div class="layout">
    <!-- 좌측: 환경 + 통계 -->
    <div class="panel">
      <h2>환경 (SinkEnv)</h2>
      <label>레이아웃</label>
      <div class="layout-selector">
        <button class="layout-btn active" data-layout="I" onclick="setLayout('I')"><span class="shape">━</span>일자</button>
        <button class="layout-btn" data-layout="L" onclick="setLayout('L')"><span class="shape">┗</span>ㄱ자</button>
        <button class="layout-btn" data-layout="U" onclick="setLayout('U')"><span class="shape">┗━┛</span>ㄷ자</button>
      </div>
      <div class="row">
        <div><label>주벽 너비</label><input type="number" id="env-width" value="3000" /></div>
        <div><label>벽 높이</label><input type="number" id="env-height" value="2400" /></div>
      </div>
      <div class="row">
        <div><label>깊이</label><input type="number" id="env-depth" value="600" /></div>
        <div><label>측정 기준</label><select id="env-base"><option value="left">좌측</option><option value="right">우측</option></select></div>
      </div>
      <div id="secondary-fields" class="secondary-fields">
        <div class="row">
          <div><label>좌측 보조벽 (mm)</label><input type="number" id="env-secL" value="1500" /></div>
          <div id="secR-wrap"><label>우측 보조벽 (mm)</label><input type="number" id="env-secR" value="1500" /></div>
        </div>
        <div class="row" style="margin-top:4px;">
          <div><label>자유단 마감재</label><input type="number" id="env-secFiller" value="60" /></div>
          <div></div>
        </div>
      </div>
      <div class="row">
        <div><label>좌측 마감재</label><input type="number" id="env-finL" value="0" /></div>
        <div><label>우측 마감재</label><input type="number" id="env-finR" value="0" /></div>
      </div>
      <div class="row">
        <div><label>몰딩 H</label><input type="number" id="env-molding" value="60" /></div>
        <div><label>걸레받이 H</label><input type="number" id="env-toe" value="100" /></div>
      </div>
      <div class="row">
        <div><label>분전반 시작</label><input type="number" id="env-distS" placeholder="null" /></div>
        <div><label>분전반 끝</label><input type="number" id="env-distE" placeholder="null" /></div>
      </div>
      <div class="row">
        <div><label>환풍구 시작</label><input type="number" id="env-ventS" value="1800" /></div>
        <div><label>환풍구 끝</label><input type="number" id="env-ventE" value="2400" /></div>
      </div>
      <div id="status"></div>
      <div class="divider"></div>
      <h2>수집 통계</h2>
      <div class="stats">
        <div class="stat-box"><div class="stat-label">총 Pair</div><div class="stat-val" id="stat-total">-</div></div>
        <div class="stat-box"><div class="stat-label">지난주</div><div class="stat-val" id="stat-week">-</div></div>
        <div class="stat-box"><div class="stat-label">평균 ⭐</div><div class="stat-val" id="stat-rating">-</div></div>
        <div class="stat-box"><div class="stat-label">평균 diff</div><div class="stat-val" id="stat-diff">-</div></div>
      </div>
    </div>

    <!-- 중앙: 3D 플래너 -->
    <div style="background:#1a1a2e; position:relative;">
      <iframe id="planner" class="planner-frame" src="/planner/embed/?preset=sink&mode=hitl"></iframe>
    </div>

    <!-- 우측: 모듈 카드 편집 -->
    <div class="panel" id="module-panel">
      <h2>모듈 편집</h2>
      <p style="font-size:11px; color:#86868b;">🎲 생성 후 모듈을 수정하세요</p>
    </div>
  </div>

  <script>
    const API = 'http://localhost:3200';
    const PLANNER_ORIGIN = location.origin;
    let currentGenerated = null;
    let currentDesign = null;  // 편집 중인 SinkDesign
    let plannerReady = false;
    let currentLayout = 'I';
    const el = (id) => document.getElementById(id);
    const status = (msg, err) => { const s = el('status'); s.textContent = msg; s.style.color = err ? '#ff3b30' : '#34c759'; };

    // ─── 레이아웃 타입 선택 ───
    window.setLayout = (type) => {
      currentLayout = type;
      document.querySelectorAll('.layout-btn').forEach(b => b.classList.toggle('active', b.dataset.layout === type));
      const secFields = el('secondary-fields');
      const secRWrap = el('secR-wrap');
      if (type === 'I') {
        secFields.classList.remove('show');
      } else {
        secFields.classList.add('show');
        secRWrap.style.display = type === 'U' ? '' : 'none';
      }
    };

    // ─── SinkDesign → PlannerState 변환 ───
    function designToPlanner(design) {
      const e = design.env;
      const toEntry = (m, allMods) => {
        const entry = {
          id: `hitl-${m.type}-${m.idx}`,
          kind: m.kind,
          width: m.width,
          moduleType: m.type === 'lt' ? 'storage' : (m.type === 'blank' ? undefined : m.type),
          doorCount: m.doorCount,
          drawerCount: m.drawerCount,
        };
        // ㄱ자/ㄷ자: secondary 모듈 orientation 전달
        if (m.orientation === 'secondary') {
          entry.orientation = 'secondary';
          // blindAnchorId: 주선 앵커 모듈의 planner ID
          if (m.blindAnchorIdx != null) {
            const anchor = allMods.find(am => am.idx === m.blindAnchorIdx && (am.orientation || 'normal') === 'normal');
            entry.blindAnchorId = anchor ? `hitl-${anchor.type}-${anchor.idx}` : undefined;
          }
        }
        return entry;
      };
      const ps = {
        presetId: 'sink',
        width: e.width,
        height: e.height,
        depth: e.depth,
        material: 'cream',
        moldingH: e.moldingH,
        toeKickH: e.toeKickH,
        finishLeftW: e.finishLeftW,
        finishRightW: e.finishRightW,
        distributorStart: e.distributorStart,
        distributorEnd: e.distributorEnd,
        ventStart: e.ventStart,
        lowerModules: design.lower.map(m => toEntry(m, design.lower)),
        upperModules: design.upper.map(m => toEntry(m, design.upper)),
        lowerCount: design.lower.length,
        upperCount: design.upper.length,
      };
      // 차선 마감재 전달
      if (e.secondaryFillerW) ps.secondaryFillerW = e.secondaryFillerW;
      return ps;
    }

    // ─── PlannerState → SinkDesign 변환 ───
    function plannerToDesign(ps) {
      const fromEntry = (m, idx) => {
        const mod = {
          idx,
          width: m.width,
          kind: m.kind,
          type: m.moduleType || 'storage',
          orientation: m.orientation || 'normal',
        };
        if (m.doorCount) mod.doorCount = m.doorCount;
        if (m.drawerCount) mod.drawerCount = m.drawerCount;
        if (m.orientation === 'secondary' && m.blindAnchorId) {
          // blindAnchorId → blindAnchorIdx 역변환
          const match = m.blindAnchorId.match(/hitl-\w+-(\d+)/);
          if (match) mod.blindAnchorIdx = Number(match[1]);
        }
        return mod;
      };
      return {
        id: currentDesign?.id || 'manual',
        timestamp: new Date().toISOString(),
        version: 'v1',
        env: {
          width: ps.width,
          height: ps.height,
          depth: ps.depth,
          finishLeftW: ps.finishLeftW || 0,
          finishRightW: ps.finishRightW || 0,
          moldingH: ps.moldingH || 60,
          toeKickH: ps.toeKickH || 100,
          distributorStart: ps.distributorStart ?? null,
          distributorEnd: ps.distributorEnd ?? null,
          ventStart: currentDesign?.env?.ventStart ?? null,
          ventEnd: currentDesign?.env?.ventEnd ?? null,
          measurementBase: currentDesign?.env?.measurementBase || 'left',
          layoutType: currentLayout,
          secondaryLeftW: currentDesign?.env?.secondaryLeftW ?? null,
          secondaryRightW: currentDesign?.env?.secondaryRightW ?? null,
          secondaryFillerW: currentDesign?.env?.secondaryFillerW ?? 60,
        },
        lower: (ps.lowerModules || []).map(fromEntry),
        upper: (ps.upperModules || []).map(fromEntry),
        meta: { generated_by: 'human-correction', parent_id: currentGenerated?.id },
      };
    }

    // ─── 플래너 통신 ───
    function sendToPlanner(design) {
      const ps = designToPlanner(design);
      const iframe = el('planner');
      iframe.contentWindow?.postMessage({ type: 'UPDATE_PLANNER', payload: ps }, '*');
    }

    window.addEventListener('message', (e) => {
      if (e.data?.type === 'PLANNER_STATE' || e.data?.type === 'HITL_STATE') {
        const ps = e.data.payload?.planner;
        if (ps) {
          currentDesign = plannerToDesign(ps);
          renderModuleCards();
        }
      }
    });

    // ─── 모듈 카드 UI 렌더 ───
    const TYPE_BADGES = { sink:'badge-sink', cook:'badge-cook', hood:'badge-hood', lt:'badge-lt', storage:'badge-storage', drawer:'badge-drawer', blank:'badge-blank' };
    const TYPE_LABELS = { sink:'개수대', cook:'가스대', hood:'후드', lt:'LT', storage:'수납장', drawer:'서랍장', blank:'빈칸' };

    function renderModuleCards() {
      if (!currentDesign) return;
      const panel = el('module-panel');
      let html = '<h2>모듈 편집</h2>';
      const layoutLabel = currentDesign.env?.layoutType === 'L' ? ' (ㄱ자)' : currentDesign.env?.layoutType === 'U' ? ' (ㄷ자)' : '';
      if (layoutLabel) html += `<div style="font-size:11px;color:#0071e3;font-weight:600;margin-bottom:6px;">📐 ${layoutLabel} 레이아웃</div>`;

      const renderSection = (section, modules, label) => {
        const primary = modules.filter(m => (m.orientation || 'normal') === 'normal');
        const secondary = modules.filter(m => m.orientation === 'secondary');

        html += `<div class="section-title"><span>📦 ${label} 주선 (${primary.length}개)</span><button class="btn-sm" onclick="addModule('${section}','normal')">+ 추가</button></div>`;
        primary.forEach((m, _) => {
          const i = modules.indexOf(m);
          html += renderModCard(section, m, i);
        });

        if (secondary.length > 0) {
          html += `<div class="section-title" style="color:#92400e;"><span>↪ ${label} 차선 (${secondary.length}개)</span><button class="btn-sm" onclick="addModule('${section}','secondary')">+ 추가</button></div>`;
          secondary.forEach((m, _) => {
            const i = modules.indexOf(m);
            html += renderModCard(section, m, i, true);
          });
        } else if (currentLayout !== 'I') {
          html += `<div class="section-title" style="color:#92400e;"><span>↪ ${label} 차선 (0개)</span><button class="btn-sm" onclick="addModule('${section}','secondary')">+ 추가</button></div>`;
        }
      };

      const renderModCard = (section, m, i, isSec = false) => {
        const badge = TYPE_BADGES[m.type] || 'badge-storage';
        const typeLabel = TYPE_LABELS[m.type] || m.type;
        const secTag = isSec ? '<span class="orientation-tag">차선</span>' : '';
        return `
          <div class="mod-card${isSec ? ' highlight' : ''}" data-section="${section}" data-idx="${i}">
            <div class="mod-header">
              <span><span class="badge ${badge}">${typeLabel}</span>${secTag}</span>
              <button class="btn-danger" onclick="removeModule('${section}',${i})">✕</button>
            </div>
            <div class="mod-row">
              <div>
                <label>너비 (mm)</label>
                <input type="number" value="${m.width}" onchange="updateMod('${section}',${i},'width',Number(this.value))" />
              </div>
              <div>
                <label>타입</label>
                <select onchange="updateMod('${section}',${i},'type',this.value)">
                  ${['sink','cook','hood','lt','storage','drawer','blank'].map(t =>
                    `<option value="${t}" ${m.type===t?'selected':''}>${TYPE_LABELS[t]||t}</option>`
                  ).join('')}
                </select>
              </div>
            </div>
            <div class="mod-row">
              <div>
                <label>종류</label>
                <select onchange="updateMod('${section}',${i},'kind',this.value)">
                  ${['door','drawer','open'].map(k =>
                    `<option value="${k}" ${m.kind===k?'selected':''}>${k==='door'?'도어':k==='drawer'?'서랍':'오픈'}</option>`
                  ).join('')}
                </select>
              </div>
              <div>
                <label>${m.kind==='drawer'?'서랍 수':'도어 수'}</label>
                <input type="number" min="1" max="5" value="${m.kind==='drawer'?(m.drawerCount||2):(m.doorCount||1)}"
                  onchange="updateMod('${section}',${i},this.dataset.field,Number(this.value))"
                  data-field="${m.kind==='drawer'?'drawerCount':'doorCount'}" />
              </div>
            </div>
          </div>`;
      };

      renderSection('lower', currentDesign.lower, '하부장');
      renderSection('upper', currentDesign.upper, '상부장');
      panel.innerHTML = html;
    }

    // ─── 모듈 수정 핸들러 ───
    window.updateMod = (section, idx, field, value) => {
      if (!currentDesign) return;
      currentDesign[section][idx][field] = value;
      // 플래너에 반영
      sendToPlanner(currentDesign);
    };

    window.removeModule = (section, idx) => {
      if (!currentDesign) return;
      currentDesign[section].splice(idx, 1);
      currentDesign[section].forEach((m, i) => m.idx = i);
      sendToPlanner(currentDesign);
      renderModuleCards();
    };

    window.addModule = (section, orientation = 'normal') => {
      if (!currentDesign) return;
      const idx = currentDesign[section].length;
      const mod = { idx, width: 450, kind: 'door', type: 'storage', doorCount: 1, orientation };
      if (orientation === 'secondary') {
        // 앵커를 주선 끝(좌측)이나 처음(우측) 모듈로 설정
        const primaries = currentDesign[section].filter(m => (m.orientation || 'normal') === 'normal');
        mod.blindAnchorIdx = primaries.length > 0 ? 0 : 0;
      }
      currentDesign[section].push(mod);
      sendToPlanner(currentDesign);
      renderModuleCards();
    };

    // ─── API 호출 ───
    function buildEnv() {
      const num = (id) => Number(el(id).value);
      const numOrNull = (id) => el(id).value === '' ? null : Number(el(id).value);
      const env = {
        width: num('env-width'), height: num('env-height'), depth: num('env-depth'),
        finishLeftW: num('env-finL'), finishRightW: num('env-finR'),
        moldingH: num('env-molding'), toeKickH: num('env-toe'),
        distributorStart: numOrNull('env-distS'), distributorEnd: numOrNull('env-distE'),
        ventStart: numOrNull('env-ventS'), ventEnd: numOrNull('env-ventE'),
        measurementBase: el('env-base').value,
        layoutType: currentLayout,
        secondaryLeftW: null,
        secondaryRightW: null,
        secondaryFillerW: 60,
      };
      if (currentLayout === 'L' || currentLayout === 'U') {
        env.secondaryLeftW = num('env-secL');
        env.secondaryFillerW = num('env-secFiller');
      }
      if (currentLayout === 'U') {
        env.secondaryRightW = num('env-secR');
      }
      return env;
    }

    async function generate() {
      status('생성 중...');
      try {
        const res = await fetch(`${API}/api/sink-hitl/generate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ env: buildEnv() }),
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || 'Generate failed');
        currentGenerated = data.design;
        currentDesign = JSON.parse(JSON.stringify(data.design));
        sendToPlanner(currentDesign);
        renderModuleCards();
        status(`✓ 생성 완료 (하부 ${data.design.lower.length} / 상부 ${data.design.upper.length})`);
      } catch (e) {
        status('✗ ' + e.message, true);
      }
    }

    async function save() {
      if (!currentGenerated || !currentDesign) { status('먼저 생성하세요', true); return; }
      status('저장 중...');
      try {
        const corrected = JSON.parse(JSON.stringify(currentDesign));
        corrected.meta = { generated_by: 'human-correction', parent_id: currentGenerated.id };
        const res = await fetch(`${API}/api/sink-hitl/save-correction`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            generated: currentGenerated,
            corrected,
            rating: Number(el('rating').value),
            comment: el('comment').value || undefined,
          }),
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || 'Save failed');
        status(`✓ 저장 (pair: ${data.pair_id}, diff ${data.diff_count}건)`);
        await refreshStats();
      } catch (e) {
        status('✗ ' + e.message, true);
      }
    }

    async function refreshStats() {
      try {
        const res = await fetch(`${API}/api/sink-hitl/stats`);
        const data = await res.json();
        el('stat-total').textContent = data.totalPairs ?? 0;
        el('stat-week').textContent = data.lastWeekPairs ?? 0;
        el('stat-rating').textContent = (data.avgRating ?? 0).toFixed(1);
        el('stat-diff').textContent = (data.avgDiffCount ?? 0).toFixed(1);
      } catch (e) { /* ignore */ }
    }

    el('btn-generate').onclick = generate;
    el('btn-next').onclick = generate;
    el('btn-save').onclick = save;
    refreshStats();
  </script>
</body>
</html>
