<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Sink HITL 수집 — 다담AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f7; color: #1d1d1f; }
    .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: #fff; border-bottom: 1px solid #d2d2d7; }
    .top-bar h1 { font-size: 16px; }
    .top-bar .actions { display: flex; gap: 8px; align-items: center; }
    .layout { display: grid; grid-template-columns: 300px 1fr 320px; height: calc(100vh - 52px); }
    .panel { background: #fff; padding: 12px; overflow-y: auto; border-right: 1px solid #e8e8ed; }
    .panel:last-child { border-right: none; border-left: 1px solid #e8e8ed; }
    .panel h2 { font-size: 12px; color: #86868b; text-transform: uppercase; letter-spacing: 0.5px; margin: 0 0 8px; }
    label { display: block; font-size: 11px; margin: 4px 0 2px; color: #515154; }
    input, select { width: 100%; padding: 5px 7px; border: 1px solid #d2d2d7; border-radius: 5px; font-size: 12px; }
    button { padding: 7px 12px; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 500; }
    .btn-primary { background: #0071e3; color: #fff; }
    .btn-primary:hover { background: #0077ed; }
    .btn-success { background: #34c759; color: #fff; }
    .btn-success:hover { background: #30b653; }
    .btn-danger { background: #ff3b30; color: #fff; font-size: 10px; padding: 3px 6px; }
    .btn-sm { font-size: 11px; padding: 4px 8px; background: #e8e8ed; color: #1d1d1f; }
    .btn-sm:hover { background: #d2d2d7; }
    .btn-rand { font-size: 10px; padding: 3px 8px; background: #f0f7ff; color: #0071e3; border: 1px solid #0071e3; border-radius: 4px; cursor: pointer; }
    .btn-rand:hover { background: #dbeafe; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; font-size: 11px; margin-top: 8px; }
    .stat-box { background: #f5f5f7; padding: 6px; border-radius: 5px; text-align: center; }
    .stat-label { color: #86868b; font-size: 9px; }
    .stat-val { font-size: 16px; font-weight: 600; margin-top: 1px; }
    #status { font-size: 11px; color: #86868b; margin-top: 6px; min-height: 14px; }
    .section-title { font-size: 11px; font-weight: 600; color: #1d1d1f; margin: 10px 0 4px; padding: 4px 0; border-bottom: 1px solid #e8e8ed; display: flex; justify-content: space-between; align-items: center; }
    .mod-card { background: #f5f5f7; border-radius: 6px; padding: 8px; margin-bottom: 6px; position: relative; }
    .mod-card.highlight { background: #e3f2fd; border: 1px solid #0071e3; }
    .mod-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .mod-row { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    .mod-row label { font-size: 10px; margin: 2px 0 1px; }
    .mod-row input, .mod-row select { font-size: 11px; padding: 3px 5px; }
    .rating-row { display: flex; gap: 6px; align-items: center; margin: 8px 0; }
    .rating-row label { margin: 0; font-size: 11px; white-space: nowrap; }
    .rating-row input { width: 50px; text-align: center; }
    .badge { display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 600; }
    .badge-sink { background: #dbeafe; color: #1e40af; }
    .badge-cook { background: #fef3c7; color: #92400e; }
    .badge-hood { background: #fce7f3; color: #9d174d; }
    .badge-lt { background: #d1fae5; color: #065f46; }
    .badge-storage { background: #f3f4f6; color: #374151; }
    .badge-drawer { background: #ede9fe; color: #5b21b6; }
    .badge-blank { background: #e5e7eb; color: #6b7280; }
    .divider { height: 1px; background: #e8e8ed; margin: 12px 0; }
    .layout-selector { display: flex; gap: 4px; margin: 4px 0 8px; }
    .layout-btn { flex: 1; padding: 8px 4px; border: 2px solid #d2d2d7; border-radius: 6px; background: #fff; cursor: pointer; text-align: center; font-size: 11px; font-weight: 600; }
    .layout-btn.active { border-color: #0071e3; background: #e3f2fd; color: #0071e3; }
    .layout-btn .shape { font-size: 18px; display: block; margin-bottom: 2px; }
    .secondary-fields { display: none; background: #f0f7ff; border-radius: 6px; padding: 8px; margin: 6px 0; }
    .secondary-fields.show { display: block; }
    .orientation-tag { font-size: 9px; padding: 1px 4px; border-radius: 3px; margin-left: 4px; }
    .orientation-tag.sec { color: #92400e; background: #fef3c7; }
    .orientation-tag.ter { color: #1e40af; background: #dbeafe; }
    .mod-card.dragging { opacity: 0.4; transform: scale(0.97); }
    .mod-card.drag-over { border-top: 3px solid #0071e3; padding-top: 11px; }
    .drag-handle { cursor: grab; color: #86868b; font-size: 16px; margin-right: 4px; user-select: none; padding: 2px 4px; border-radius: 3px; }
    .drag-handle:hover { background: #e8e8ed; color: #1d1d1f; }
    .drag-handle:active { cursor: grabbing; }
    .move-btns { display: flex; flex-direction: column; gap: 1px; margin-left: auto; margin-right: 4px; }
    .move-btn { background: none; border: 1px solid #d2d2d7; border-radius: 3px; font-size: 9px; padding: 0 4px; line-height: 14px; cursor: pointer; color: #86868b; }
    .move-btn:hover { background: #e8e8ed; color: #1d1d1f; }
    .env-section-header { display: flex; justify-content: space-between; align-items: center; margin: 6px 0 2px; }
    .env-section-header label { margin: 0; }
    /* ─── SVG 2D 뷰 ─── */
    #svg-container { background: #fafafa; display: flex; align-items: center; justify-content: center; overflow: auto; padding: 20px; min-width: 300px; }
    #elevation-svg { max-width: 100%; max-height: 100%; }
    .svg-module { cursor: pointer; transition: opacity 0.15s; }
    .svg-module:hover { opacity: 0.8; }
    .svg-module.selected rect:first-child { stroke-width: 3 !important; stroke: #0071e3 !important; }
    .zone-overlay { opacity: 0.25; pointer-events: none; }
    .svg-section-label { font-size: 11px; fill: #86868b; font-weight: 600; }
  </style>
</head>
<body>
  <div class="top-bar">
    <h1>Sink HITL 수집</h1>
    <div class="actions">
      <div class="rating-row">
        <label>평점</label>
        <input type="number" id="rating" value="3" min="1" max="5" />
        <input type="text" id="comment" placeholder="주석(선택)" style="width:120px" />
      </div>
      <button class="btn-success" id="btn-save">저장</button>
      <button class="btn-primary" id="btn-generate">생성</button>
      <button class="btn-primary" id="btn-next">다음</button>
    </div>
  </div>

  <div class="layout">
    <!-- 좌측: 환경 + 통계 -->
    <div class="panel">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>환경 (SinkEnv)</h2>
        <button class="btn-rand" onclick="randomizeEnv()">🎲 환경 랜덤</button>
      </div>
      <label>레이아웃</label>
      <div class="layout-selector">
        <button class="layout-btn active" data-layout="I" onclick="setLayout('I')"><span class="shape">━</span>일자</button>
        <button class="layout-btn" data-layout="L" onclick="setLayout('L')"><span class="shape">┗</span>ㄱ자</button>
        <button class="layout-btn" data-layout="U" onclick="setLayout('U')"><span class="shape">┗━┛</span>ㄷ자</button>
      </div>
      <div class="row">
        <div><label>주벽 너비</label><input type="number" id="env-width" value="3000" /></div>
        <div><label>벽 높이</label><input type="number" id="env-height" value="2400" /></div>
      </div>
      <div class="row">
        <div><label>깊이</label><input type="number" id="env-depth" value="650" /></div>
        <div><label>측정 기준</label><select id="env-base"><option value="left">좌측</option><option value="right">우측</option></select></div>
      </div>
      <div id="secondary-fields" class="secondary-fields">
        <div class="row">
          <div><label>좌측 보조벽 (mm)</label><input type="number" id="env-secL" value="1500" /></div>
          <div id="secR-wrap"><label>우측 보조벽 (mm)</label><input type="number" id="env-secR" value="1500" /></div>
        </div>
        <div class="row" style="margin-top:4px;">
          <div><label>자유단 마감재</label><input type="number" id="env-secFiller" value="60" /></div>
          <div></div>
        </div>
      </div>
      <div class="row">
        <div><label>좌측 마감재</label><input type="number" id="env-finL" value="0" /></div>
        <div><label>우측 마감재</label><input type="number" id="env-finR" value="0" /></div>
      </div>
      <div class="row">
        <div><label>몰딩 H</label><input type="number" id="env-molding" value="60" /></div>
        <div><label>걸레받이 H</label><input type="number" id="env-toe" value="100" /></div>
      </div>
      <div class="row">
        <div><label>분배기 시작</label><input type="number" id="env-distS" placeholder="자동" /></div>
        <div><label>분배기 끝</label><input type="number" id="env-distE" placeholder="자동" /></div>
      </div>
      <div class="row">
        <div><label>환풍구 시작</label><input type="number" id="env-ventS" placeholder="자동" /></div>
        <div><label>환풍구 끝</label><input type="number" id="env-ventE" placeholder="자동" /></div>
      </div>
      <div id="status"></div>
      <div class="divider"></div>
      <h2>수집 통계</h2>
      <div class="stats">
        <div class="stat-box"><div class="stat-label">총 Pair</div><div class="stat-val" id="stat-total">-</div></div>
        <div class="stat-box"><div class="stat-label">지난주</div><div class="stat-val" id="stat-week">-</div></div>
        <div class="stat-box"><div class="stat-label">평균 ⭐</div><div class="stat-val" id="stat-rating">-</div></div>
        <div class="stat-box"><div class="stat-label">평균 diff</div><div class="stat-val" id="stat-diff">-</div></div>
      </div>
    </div>

    <!-- 중앙: 2D SVG 정면도 -->
    <div id="svg-container">
      <svg id="elevation-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <!-- 우측: 모듈 카드 편집 -->
    <div class="panel" id="module-panel">
      <h2>모듈 편집</h2>
      <p style="font-size:11px; color:#86868b;">🎲 생성 후 모듈을 수정하세요</p>
    </div>
  </div>

  <script>
    const API = 'http://localhost:3200';
    let currentGenerated = null;
    let currentDesign = null;
    let currentLayout = 'I';
    let selectedModule = null; // { section, idx }
    const el = (id) => document.getElementById(id);
    const status = (msg, err) => { const s = el('status'); s.textContent = msg; s.style.color = err ? '#ff3b30' : '#34c759'; };

    // ─── SVG 헬퍼 ───
    function svgRect(x, y, w, h, fill, stroke, sw = 1, rx = 2) {
      return `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}" rx="${rx}"/>`;
    }
    function svgText(x, y, text, opts = {}) {
      const anchor = opts.anchor || 'middle';
      const sz = opts.size || 10;
      const fill = opts.fill || '#333';
      const weight = opts.weight || 'normal';
      return `<text x="${x}" y="${y}" text-anchor="${anchor}" font-size="${sz}" fill="${fill}" font-weight="${weight}" font-family="-apple-system,sans-serif">${text}</text>`;
    }
    function svgLine(x1, y1, x2, y2, stroke = '#666', sw = 1, dash = '') {
      return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${stroke}" stroke-width="${sw}" ${dash ? `stroke-dasharray="${dash}"` : ''}/>`;
    }

    // ─── 모듈 타입 색상맵 ───
    const MODULE_COLORS = {
      sink:    { fill: '#dbeafe', stroke: '#3b82f6' },
      cook:    { fill: '#fef3c7', stroke: '#f59e0b' },
      hood:    { fill: '#fce7f3', stroke: '#ec4899' },
      lt:      { fill: '#d1fae5', stroke: '#10b981' },
      storage: { fill: '#f3f4f6', stroke: '#9ca3af' },
      drawer:  { fill: '#ede9fe', stroke: '#8b5cf6' },
      blank:   { fill: '#e5e7eb', stroke: '#6b7280' },
    };
    const TYPE_BADGES = { sink:'badge-sink', cook:'badge-cook', hood:'badge-hood', lt:'badge-lt', storage:'badge-storage', drawer:'badge-drawer', blank:'badge-blank' };
    const TYPE_LABELS = { sink:'개수대', cook:'가스대', hood:'후드', lt:'LT', storage:'수납장', drawer:'서랍장', blank:'빈칸' };

    // ─── 2D SVG 정면도 렌더 ───
    function renderSVG() {
      if (!currentDesign) return;
      const env = currentDesign.env;
      const PAD = 40;

      // 스케일 계산 (컨테이너 기준)
      const container = el('svg-container');
      const availW = Math.max(container.clientWidth - PAD * 2 - 40, 200);
      const scale = Math.min(availW / env.width, 0.25);

      // 수직 레이아웃 높이 (비례)
      const vScale = scale * 0.5; // 수직 방향은 절반 비율로 (너무 세로로 길어지지 않게)
      const moldH = env.moldingH * vScale;
      const upperH = 720 * vScale;
      const gapH = 30; // 백스플래시 갭 (고정 px)
      const counterH = 4;
      const lowerH = (env.height - env.moldingH - 720 - env.toeKickH - 450) * vScale; // 나머지
      const lowerHClamped = Math.max(lowerH, upperH * 0.9); // 하부장 최소 높이
      const toeH = env.toeKickH * vScale;

      const totalW = env.width * scale;
      const svgW = totalW + PAD * 2;

      // 수직 위치
      let y = PAD;
      const moldY = y; y += moldH;
      const upperY = y; y += upperH;
      y += gapH; // 백스플래시
      const counterY = y; y += counterH;
      const lowerY = y; y += lowerHClamped;
      const toeY = y; y += toeH;
      const primaryBottom = y;

      // ㄱ자/ㄷ자 차선 영역
      const hasSecondary = currentLayout !== 'I' && currentDesign.lower.some(m => m.orientation === 'secondary');
      const hasTertiary = currentLayout === 'U' && currentDesign.lower.some(m => m.orientation === 'tertiary');
      const armH = lowerHClamped + upperH + gapH + counterH + moldH + toeH;
      const armGap = 30;
      let svgH = primaryBottom + PAD + 30; // 치수선 공간
      if (hasSecondary || hasTertiary) svgH += armGap + armH + 20;

      let svg = `<svg id="elevation-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${svgW} ${svgH}" width="${svgW}" height="${svgH}">`;

      // ─── SVG defs (해칭 패턴) ───
      svg += `<defs>
        <pattern id="hatch-dist" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
          <line x1="0" y1="0" x2="0" y2="6" stroke="#3b82f6" stroke-width="1.5"/>
        </pattern>
        <pattern id="hatch-vent" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)">
          <line x1="0" y1="0" x2="0" y2="6" stroke="#ef4444" stroke-width="1.5"/>
        </pattern>
      </defs>`;

      // ─── 배경 벽 ───
      svg += svgRect(PAD, moldY, totalW, primaryBottom - moldY - toeH, '#f8f8f8', '#e0e0e0', 0.5, 0);

      // ─── 상몰딩 ───
      if (moldH > 1) {
        svg += svgRect(PAD, moldY, totalW, moldH, '#d4a574', '#b8956a', 1, 0);
        svg += svgText(PAD + totalW / 2, moldY + moldH / 2 + 3, '몰딩', { size: 8, fill: '#8b6e4e' });
      }

      // ─── 모듈 행 렌더 함수 ───
      function renderModRow(modules, baseX, wallW, y, rowH, section, orientFilter) {
        const mods = modules.filter(m => (m.orientation || 'normal') === orientFilter);
        const finL = orientFilter === 'normal' ? env.finishLeftW : 0;
        let x = baseX + finL * scale;
        mods.forEach(m => {
          const realIdx = modules.indexOf(m);
          const w = m.width * scale;
          const color = MODULE_COLORS[m.type] || MODULE_COLORS.storage;
          const isSel = selectedModule && selectedModule.section === section && selectedModule.idx === realIdx;

          svg += `<g class="svg-module${isSel ? ' selected' : ''}" data-section="${section}" data-idx="${realIdx}" onclick="selectModule('${section}',${realIdx})">`;
          svg += svgRect(x, y, w, rowH, color.fill, isSel ? '#0071e3' : color.stroke, isSel ? 3 : 1.5, 2);

          // 타입 라벨
          if (w > 25) {
            svg += svgText(x + w / 2, y + rowH / 2 - 5, TYPE_LABELS[m.type] || m.type, { size: w > 50 ? 10 : 8, weight: '600', fill: color.stroke });
          }
          // 폭 (mm)
          if (w > 20) {
            svg += svgText(x + w / 2, y + rowH / 2 + 9, m.width + '', { size: w > 50 ? 9 : 7, fill: '#888' });
          }

          // 도어선 (2도어)
          if (m.kind === 'door' && (m.doorCount || 1) >= 2) {
            svg += svgLine(x + w / 2, y + 3, x + w / 2, y + rowH - 3, '#aaa', 0.5);
          }
          // 서랍선
          if (m.kind === 'drawer') {
            const cnt = m.drawerCount || 2;
            for (let d = 1; d < cnt; d++) {
              const dy = y + (rowH * d / cnt);
              svg += svgLine(x + 3, dy, x + w - 3, dy, '#aaa', 0.5);
            }
          }
          // 오픈 (점선 테두리)
          if (m.kind === 'open') {
            svg += svgRect(x + 2, y + 2, w - 4, rowH - 4, 'none', '#ccc', 1, 1);
          }

          svg += `</g>`;
          x += w;
        });
      }

      // ─── 상부장 섹션 라벨 + 모듈 ───
      svg += svgText(PAD + 4, upperY - 3, '상부장', { size: 9, fill: '#86868b', weight: '600', anchor: 'start' });
      renderModRow(currentDesign.upper, PAD, env.width, upperY, upperH, 'upper', 'normal');

      // ─── 상판 ───
      svg += svgLine(PAD, counterY, PAD + totalW, counterY, '#555', 3);
      svg += svgText(PAD + totalW + 5, counterY + 3, '상판', { size: 7, fill: '#888', anchor: 'start' });

      // ─── 하부장 섹션 라벨 + 모듈 ───
      svg += svgText(PAD + 4, lowerY - 3, '하부장', { size: 9, fill: '#86868b', weight: '600', anchor: 'start' });
      renderModRow(currentDesign.lower, PAD, env.width, lowerY, lowerHClamped, 'lower', 'normal');

      // ─── 걸레받이 ───
      if (toeH > 1) {
        svg += svgRect(PAD, toeY, totalW, toeH, '#9e9e9e', '#888', 0.5, 0);
        svg += svgText(PAD + totalW / 2, toeY + toeH / 2 + 3, '걸레받이', { size: 7, fill: '#fff' });
      }

      // ─── 좌/우 마감재 ───
      if (env.finishLeftW > 0) {
        const fW = env.finishLeftW * scale;
        svg += svgRect(PAD, upperY, fW, primaryBottom - upperY, '#e8e3de', '#c9c0b5', 0.5, 0);
      }
      if (env.finishRightW > 0) {
        const fW = env.finishRightW * scale;
        svg += svgRect(PAD + totalW - fW, upperY, fW, primaryBottom - upperY, '#e8e3de', '#c9c0b5', 0.5, 0);
      }

      // ─── 분배기 존 오버레이 ───
      if (env.distributorStart != null && env.distributorEnd != null) {
        const dx = PAD + env.distributorStart * scale;
        const dw = (env.distributorEnd - env.distributorStart) * scale;
        svg += `<rect class="zone-overlay" x="${dx}" y="${lowerY}" width="${dw}" height="${lowerHClamped}" fill="url(#hatch-dist)" rx="2"/>`;
        svg += svgText(dx + dw / 2, lowerY - 3, '분배기', { size: 8, fill: '#3b82f6', weight: '600' });
      }

      // ─── 환풍구 존 오버레이 ───
      if (env.ventStart != null && env.ventEnd != null) {
        const vx = PAD + env.ventStart * scale;
        const vw = (env.ventEnd - env.ventStart) * scale;
        svg += `<rect class="zone-overlay" x="${vx}" y="${upperY}" width="${vw}" height="${upperH}" fill="url(#hatch-vent)" rx="2"/>`;
        svg += svgText(vx + vw / 2, upperY - 3, '환풍구', { size: 8, fill: '#ef4444', weight: '600' });
      }

      // ─── 총 폭 치수선 ───
      const dimY = primaryBottom + 15;
      svg += svgLine(PAD, dimY, PAD + totalW, dimY, '#333', 0.5);
      svg += svgLine(PAD, dimY - 4, PAD, dimY + 4, '#333', 1);
      svg += svgLine(PAD + totalW, dimY - 4, PAD + totalW, dimY + 4, '#333', 1);
      svg += svgText(PAD + totalW / 2, dimY + 13, env.width + 'mm', { size: 11, weight: '600' });

      // ─── ㄱ자/ㄷ자 차선 블록 ───
      if (hasSecondary || hasTertiary) {
        const armY = primaryBottom + armGap;
        const secW = (env.secondaryLeftW || 1500) * scale;
        const terW = (env.secondaryRightW || 1500) * scale;

        if (hasSecondary) {
          // 코너 연결선
          svg += svgLine(PAD, primaryBottom, PAD, armY, '#0071e3', 1.5, '4 2');
          svg += svgText(PAD + 8, armY - 4, '↪ 좌측 차선', { size: 9, fill: '#92400e', weight: '600', anchor: 'start' });

          // 차선 배경
          svg += svgRect(PAD, armY, secW, armH, '#fefce8', '#e8e3de', 0.5, 2);

          // 차선 상부장
          renderModRow(currentDesign.upper, PAD, env.secondaryLeftW || 1500, armY + moldH, upperH, 'upper', 'secondary');
          // 차선 하부장
          renderModRow(currentDesign.lower, PAD, env.secondaryLeftW || 1500, armY + moldH + upperH + gapH + counterH, lowerHClamped, 'lower', 'secondary');

          // 차선 치수
          const secDimY = armY + armH + 10;
          svg += svgLine(PAD, secDimY, PAD + secW, secDimY, '#92400e', 0.5);
          svg += svgText(PAD + secW / 2, secDimY + 12, (env.secondaryLeftW || 1500) + 'mm', { size: 9, fill: '#92400e', weight: '600' });
        }

        if (hasTertiary) {
          const terX = PAD + totalW - terW;
          svg += svgLine(PAD + totalW, primaryBottom, PAD + totalW, armY, '#1e40af', 1.5, '4 2');
          svg += svgText(terX + 8, armY - 4, '↪ 우측 차선', { size: 9, fill: '#1e40af', weight: '600', anchor: 'start' });

          svg += svgRect(terX, armY, terW, armH, '#eff6ff', '#d2d2d7', 0.5, 2);

          renderModRow(currentDesign.upper, terX, env.secondaryRightW || 1500, armY + moldH, upperH, 'upper', 'tertiary');
          renderModRow(currentDesign.lower, terX, env.secondaryRightW || 1500, armY + moldH + upperH + gapH + counterH, lowerHClamped, 'lower', 'tertiary');

          const terDimY = armY + armH + 10;
          svg += svgLine(terX, terDimY, terX + terW, terDimY, '#1e40af', 0.5);
          svg += svgText(terX + terW / 2, terDimY + 12, (env.secondaryRightW || 1500) + 'mm', { size: 9, fill: '#1e40af', weight: '600' });
        }
      }

      svg += `</svg>`;
      el('svg-container').innerHTML = svg;
    }

    // ─── 클릭 ↔ 하이라이트 동기화 ───
    window.selectModule = (section, idx) => {
      selectedModule = { section, idx };
      // SVG 재렌더 (선택 상태 반영)
      renderSVG();
      // 카드 하이라이트
      document.querySelectorAll('.mod-card.highlight').forEach(e => e.classList.remove('highlight'));
      const card = document.querySelector(`.mod-card[data-section="${section}"][data-idx="${idx}"]`);
      if (card) {
        card.classList.add('highlight');
        card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    };

    // ─── 랜덤 유틸리티 ───
    function randBetween(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function pickOne(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function roundTo50(v) { return Math.round(v / 50) * 50; }

    // ─── 환경 랜덤 생성 ───
    window.randomizeEnv = () => {
      const layout = pickOne(['I', 'I', 'I', 'L', 'L', 'U']);
      setLayout(layout);
      const width = pickOne([2400, 2700, 3000, 3000, 3200, 3600, 4000]);
      el('env-width').value = width;
      el('env-height').value = 2400;
      el('env-depth').value = 650;
      el('env-base').value = pickOne(['left', 'left', 'left', 'right']);
      el('env-finL').value = pickOne([0, 0, 0, 18, 18]);
      el('env-finR').value = pickOne([0, 0, 0, 18, 18]);
      el('env-molding').value = pickOne([50, 60, 60]);
      el('env-toe').value = pickOne([100, 100, 120]);
      const ventWidth = pickOne([400, 500, 600]);
      const ventStart = roundTo50(randBetween(Math.floor(width * 0.4), Math.floor(width * 0.8) - ventWidth));
      el('env-ventS').value = ventStart;
      el('env-ventE').value = ventStart + ventWidth;
      if (Math.random() < 0.7) {
        const distWidth = pickOne([200, 250, 300, 350, 400]);
        const distStart = roundTo50(randBetween(Math.floor(width * 0.05), Math.floor(width * 0.45)));
        el('env-distS').value = distStart;
        el('env-distE').value = distStart + distWidth;
      } else {
        el('env-distS').value = '';
        el('env-distE').value = '';
      }
      if (layout === 'L' || layout === 'U') {
        el('env-secL').value = pickOne([1200, 1500, 1500, 1800, 2000]);
        el('env-secFiller').value = 60;
      }
      if (layout === 'U') {
        el('env-secR').value = pickOne([1200, 1500, 1500, 1800, 2000]);
      }
    };

    // ─── 레이아웃 타입 선택 ───
    window.setLayout = (type) => {
      currentLayout = type;
      document.querySelectorAll('.layout-btn').forEach(b => b.classList.toggle('active', b.dataset.layout === type));
      const secFields = el('secondary-fields');
      const secRWrap = el('secR-wrap');
      if (type === 'I') {
        secFields.classList.remove('show');
      } else {
        secFields.classList.add('show');
        secRWrap.style.display = type === 'U' ? '' : 'none';
      }
    };

    // ─── 모듈 카드 UI 렌더 ───
    function renderModuleCards() {
      if (!currentDesign) return;
      const panel = el('module-panel');
      let html = '<h2>모듈 편집</h2>';
      const layoutLabel = currentDesign.env?.layoutType === 'L' ? ' (ㄱ자)' : currentDesign.env?.layoutType === 'U' ? ' (ㄷ자)' : '';
      if (layoutLabel) html += `<div style="font-size:11px;color:#0071e3;font-weight:600;margin-bottom:6px;">📐 ${layoutLabel} 레이아웃</div>`;

      const renderSection = (section, modules, label) => {
        const primary = modules.filter(m => (m.orientation || 'normal') === 'normal');
        const secondary = modules.filter(m => m.orientation === 'secondary');
        const tertiary = modules.filter(m => m.orientation === 'tertiary');

        html += `<div class="section-title"><span>📦 ${label} 주선 (${primary.length}개)</span><button class="btn-sm" onclick="addModule('${section}','normal')">+ 추가</button></div>`;
        primary.forEach(m => { html += renderModCard(section, m, modules.indexOf(m)); });

        if (secondary.length > 0 || currentLayout !== 'I') {
          html += `<div class="section-title" style="color:#92400e;"><span>↪ ${label} 좌측 차선 (${secondary.length}개)</span><button class="btn-sm" onclick="addModule('${section}','secondary')">+ 추가</button></div>`;
          secondary.forEach(m => { html += renderModCard(section, m, modules.indexOf(m), 'sec'); });
        }

        if (tertiary.length > 0 || currentLayout === 'U') {
          html += `<div class="section-title" style="color:#1e40af;"><span>↪ ${label} 우측 차차선 (${tertiary.length}개)</span><button class="btn-sm" onclick="addModule('${section}','tertiary')">+ 추가</button></div>`;
          tertiary.forEach(m => { html += renderModCard(section, m, modules.indexOf(m), 'ter'); });
        }
      };

      const renderModCard = (section, m, i, lineType = null) => {
        const badge = TYPE_BADGES[m.type] || 'badge-storage';
        const typeLabel = TYPE_LABELS[m.type] || m.type;
        const tagMap = { sec: '<span class="orientation-tag sec">좌 차선</span>', ter: '<span class="orientation-tag ter">우 차차선</span>' };
        const secTag = lineType ? (tagMap[lineType] || '') : '';
        const orient = m.orientation || 'normal';
        const isSel = selectedModule && selectedModule.section === section && selectedModule.idx === i;
        return `
          <div class="mod-card${isSel ? ' highlight' : ''}${lineType && !isSel ? ' highlight' : ''}" data-section="${section}" data-idx="${i}" data-orient="${orient}"
               onclick="selectModule('${section}',${i})">
            <div class="mod-header">
              <span class="drag-handle" title="드래그하여 순서 변경">⠿</span>
              <span><span class="badge ${badge}">${typeLabel}</span>${secTag}</span>
              <span class="move-btns">
                <button class="move-btn" onclick="event.stopPropagation();moveModule('${section}',${i},'${orient}',-1)" title="위로">▲</button>
                <button class="move-btn" onclick="event.stopPropagation();moveModule('${section}',${i},'${orient}',1)" title="아래로">▼</button>
              </span>
              <button class="btn-danger" onclick="event.stopPropagation();removeModule('${section}',${i})">✕</button>
            </div>
            <div class="mod-row">
              <div>
                <label>너비 (mm)</label>
                <input type="number" value="${m.width}" onclick="event.stopPropagation()" onchange="updateMod('${section}',${i},'width',Number(this.value))" />
              </div>
              <div>
                <label>타입</label>
                <select onclick="event.stopPropagation()" onchange="updateMod('${section}',${i},'type',this.value)">
                  ${['sink','cook','hood','lt','storage','drawer','blank'].map(t =>
                    `<option value="${t}" ${m.type===t?'selected':''}>${TYPE_LABELS[t]||t}</option>`
                  ).join('')}
                </select>
              </div>
            </div>
            <div class="mod-row">
              <div>
                <label>종류</label>
                <select onclick="event.stopPropagation()" onchange="updateMod('${section}',${i},'kind',this.value)">
                  ${['door','drawer','open'].map(k =>
                    `<option value="${k}" ${m.kind===k?'selected':''}>${k==='door'?'도어':k==='drawer'?'서랍':'오픈'}</option>`
                  ).join('')}
                </select>
              </div>
              <div>
                <label>${m.kind==='drawer'?'서랍 수':'도어 수'}</label>
                <input type="number" min="1" max="5" value="${m.kind==='drawer'?(m.drawerCount||2):(m.doorCount||1)}"
                  onclick="event.stopPropagation()"
                  onchange="updateMod('${section}',${i},this.dataset.field,Number(this.value))"
                  data-field="${m.kind==='drawer'?'drawerCount':'doorCount'}" />
              </div>
            </div>
          </div>`;
      };

      renderSection('lower', currentDesign.lower, '하부장');
      renderSection('upper', currentDesign.upper, '상부장');
      panel.innerHTML = html;
    }

    // ─── 모듈 수정 핸들러 ───
    window.updateMod = (section, idx, field, value) => {
      if (!currentDesign) return;
      currentDesign[section][idx][field] = value;
      renderSVG(); // 2D 뷰 즉시 업데이트
    };

    window.removeModule = (section, idx) => {
      if (!currentDesign) return;
      currentDesign[section].splice(idx, 1);
      currentDesign[section].forEach((m, i) => m.idx = i);
      selectedModule = null;
      renderSVG();
      renderModuleCards();
    };

    window.addModule = (section, orientation = 'normal') => {
      if (!currentDesign) return;
      const idx = currentDesign[section].length;
      const mod = { idx, width: 450, kind: 'door', type: 'storage', doorCount: 1, orientation };
      if (orientation === 'secondary') {
        mod.blindAnchorIdx = 0;
      } else if (orientation === 'tertiary') {
        const primaries = currentDesign[section].filter(m => (m.orientation || 'normal') === 'normal');
        mod.blindAnchorIdx = primaries.length > 0 ? primaries.length - 1 : 0;
      }
      currentDesign[section].push(mod);
      renderSVG();
      renderModuleCards();
    };

    // ─── 드래그 앤 드롭 재정렬 (핸들 mousedown → 동적 draggable) ───
    let dragState = null;

    document.addEventListener('mousedown', (e) => {
      const handle = e.target.closest('.drag-handle');
      if (!handle) return;
      const card = handle.closest('.mod-card');
      if (card) card.setAttribute('draggable', 'true');
    });

    document.addEventListener('mouseup', () => {
      document.querySelectorAll('.mod-card[draggable]').forEach(c => c.removeAttribute('draggable'));
    });

    document.addEventListener('dragstart', (e) => {
      const card = e.target.closest('.mod-card');
      if (!card || !card.hasAttribute('draggable')) { e.preventDefault(); return; }
      dragState = { section: card.dataset.section, idx: Number(card.dataset.idx), orient: card.dataset.orient };
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', '');
    });

    document.addEventListener('dragover', (e) => {
      const card = e.target.closest('.mod-card');
      if (!card || !dragState) return;
      if (card.dataset.section !== dragState.section || card.dataset.orient !== dragState.orient) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll('.mod-card.drag-over').forEach(c => c.classList.remove('drag-over'));
      card.classList.add('drag-over');
    });

    document.addEventListener('dragleave', (e) => {
      const card = e.target.closest('.mod-card');
      if (card && !card.contains(e.relatedTarget)) card.classList.remove('drag-over');
    });

    document.addEventListener('drop', (e) => {
      e.preventDefault();
      const card = e.target.closest('.mod-card');
      if (!card || !dragState) return;
      card.classList.remove('drag-over');
      const targetIdx = Number(card.dataset.idx);
      if (card.dataset.section !== dragState.section || card.dataset.orient !== dragState.orient) return;
      if (targetIdx === dragState.idx) return;
      const mods = currentDesign[dragState.section];
      const moved = mods.splice(dragState.idx, 1)[0];
      const insertIdx = targetIdx > dragState.idx ? targetIdx - 1 : targetIdx;
      mods.splice(insertIdx, 0, moved);
      mods.forEach((m, i) => m.idx = i);
      renderSVG();
      renderModuleCards();
    });

    document.addEventListener('dragend', () => {
      document.querySelectorAll('.mod-card').forEach(c => { c.classList.remove('dragging', 'drag-over'); c.removeAttribute('draggable'); });
      dragState = null;
    });

    // ─── ▲▼ 버튼 이동 ───
    window.moveModule = (section, idx, orient, dir) => {
      if (!currentDesign) return;
      const mods = currentDesign[section];
      const sameGroup = mods.map((m, i) => ({ m, i })).filter(({ m }) => (m.orientation || 'normal') === orient);
      const posInGroup = sameGroup.findIndex(({ i }) => i === idx);
      const targetPos = posInGroup + dir;
      if (targetPos < 0 || targetPos >= sameGroup.length) return;
      const fromIdx = sameGroup[posInGroup].i;
      const toIdx = sameGroup[targetPos].i;
      [mods[fromIdx], mods[toIdx]] = [mods[toIdx], mods[fromIdx]];
      mods.forEach((m, i) => m.idx = i);
      renderSVG();
      renderModuleCards();
    };

    // ─── API 호출 ───
    function buildEnv() {
      const num = (id) => Number(el(id).value);
      const numOrNull = (id) => el(id).value === '' ? null : Number(el(id).value);
      const env = {
        width: num('env-width'), height: num('env-height'), depth: num('env-depth'),
        finishLeftW: num('env-finL'), finishRightW: num('env-finR'),
        moldingH: num('env-molding'), toeKickH: num('env-toe'),
        distributorStart: numOrNull('env-distS'), distributorEnd: numOrNull('env-distE'),
        ventStart: numOrNull('env-ventS'), ventEnd: numOrNull('env-ventE'),
        measurementBase: el('env-base').value,
        layoutType: currentLayout,
        secondaryLeftW: null, secondaryRightW: null, secondaryFillerW: 60,
      };
      if (currentLayout === 'L' || currentLayout === 'U') {
        env.secondaryLeftW = num('env-secL');
        env.secondaryFillerW = num('env-secFiller');
      }
      if (currentLayout === 'U') { env.secondaryRightW = num('env-secR'); }
      return env;
    }

    async function generate(autoRandomize = false) {
      if (autoRandomize) randomizeEnv();
      status('생성 중...');
      try {
        const res = await fetch(`${API}/api/sink-hitl/generate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ env: buildEnv() }),
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || 'Generate failed');
        currentGenerated = data.design;
        currentDesign = JSON.parse(JSON.stringify(data.design));
        selectedModule = null;
        renderSVG();
        renderModuleCards();
        const lt = data.design.env.layoutType === 'L' ? 'ㄱ자' : data.design.env.layoutType === 'U' ? 'ㄷ자' : '일자';
        status(`✓ ${lt} 생성 (하부 ${data.design.lower.length} / 상부 ${data.design.upper.length})`);
      } catch (e) {
        status('✗ ' + e.message, true);
      }
    }

    async function save() {
      if (!currentGenerated || !currentDesign) { status('먼저 생성하세요', true); return; }
      status('저장 중...');
      try {
        const corrected = JSON.parse(JSON.stringify(currentDesign));
        corrected.meta = { generated_by: 'human-correction', parent_id: currentGenerated.id };
        const res = await fetch(`${API}/api/sink-hitl/save-correction`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            generated: currentGenerated,
            corrected,
            rating: Number(el('rating').value),
            comment: el('comment').value || undefined,
          }),
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || 'Save failed');
        status(`✓ 저장 (pair: ${data.pair_id}, diff ${data.diff_count}건)`);
        await refreshStats();
      } catch (e) {
        status('✗ ' + e.message, true);
      }
    }

    async function refreshStats() {
      try {
        const res = await fetch(`${API}/api/sink-hitl/stats`);
        const data = await res.json();
        el('stat-total').textContent = data.totalPairs ?? 0;
        el('stat-week').textContent = data.lastWeekPairs ?? 0;
        el('stat-rating').textContent = (data.avgRating ?? 0).toFixed(1);
        el('stat-diff').textContent = (data.avgDiffCount ?? 0).toFixed(1);
      } catch (e) { /* ignore */ }
    }

    el('btn-generate').onclick = () => generate(false);
    el('btn-next').onclick = () => generate(true);
    el('btn-save').onclick = save;
    refreshStats();
  </script>
</body>
</html>
