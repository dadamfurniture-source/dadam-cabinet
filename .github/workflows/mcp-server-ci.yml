name: MCP Server CI

on:
  push:
    branches: [main]
    paths:
      - 'mcp-server/**'
  pull_request:
    branches: [main]
    paths:
      - 'mcp-server/**'

env:
  NODE_VERSION: '20'

defaults:
  run:
    working-directory: mcp-server

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Docker build (verify)
        if: github.event_name == 'pull_request'
        run: docker build -t dadam-agent:test .

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [test-and-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Railway deploy
        working-directory: /tmp
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK }}")
          echo "Railway deploy hook response: $response"
          if [ "$response" -lt 200 ] || [ "$response" -ge 300 ]; then
            echo "::error::Railway deploy hook failed with HTTP $response"
            exit 1
          fi
          echo "Railway deployment triggered successfully"
