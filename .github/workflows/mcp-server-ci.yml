name: MCP Server CI

on:
  push:
    branches: [main]
    paths:
      - 'mcp-server/**'
  pull_request:
    branches: [main]
    paths:
      - 'mcp-server/**'

env:
  NODE_VERSION: '20'

defaults:
  run:
    working-directory: mcp-server

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Docker build (verify)
        if: github.event_name == 'pull_request'
        run: docker build -t dadam-agent:test .
